services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://scheduler:scheduler@postgres:5432/scheduler
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: ./backend
    command: ["python", "-m", "app.scheduler.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://scheduler:scheduler@postgres:5432/scheduler
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      RUN_MIGRATIONS: "false"
    depends_on:
      api:
        condition: service_started

  # Worker is scoped to one project (see Deployment.md): after first boot, register a
  # user + project through the UI, then set WORKER_PROJECT_ID and run this profile:
  #   WORKER_PROJECT_ID=<uuid> docker compose --profile worker up --scale worker=3 worker
  worker:
    build: ./backend
    profiles: ["worker"]
    command: ["python", "-m", "app.workers.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://scheduler:scheduler@postgres:5432/scheduler
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      RUN_MIGRATIONS: "false"
      WORKER_PROJECT_ID: ${WORKER_PROJECT_ID:?set WORKER_PROJECT_ID to the project UUID to serve}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
    depends_on:
      api:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

volumes:
  postgres_data:
